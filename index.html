<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>nick@universe — terminal v2</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<!-- GSAP + plugins -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>

<!-- Particles.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<!-- Typed.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.1.0/typed.umd.js"></script>

<!-- Chroma.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>

<!-- Anime.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>

<!-- THREE.js for 3D effects -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- Howler.js for audio (beeps) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #050709;
  --bg1: #0c0e14;
  --bg2: #111520;
  --bg3: #161b28;
  --border: #1a2235;
  --border2: #243050;
  --border-glow: rgba(0,212,255,0.15);
  --cyan: #4ec9b0;
  --blue: #569cd6;
  --purple: #c586c0;
  --yellow: #e5c07b;
  --green: #6bce9e;
  --red: #e06c75;
  --orange: #f4a261;
  --accent: #00d4ff;
  --accent2: #0099cc;
  --accent3: #00ff88;
  --magenta: #ff00aa;
  --text: #c8d3e0;
  --dim: #3a4a5e;
  --dim2: #2a3545;
  --white: #ffffff;
  --dcdcaa: #dcdcaa;
  --glow: 0 0 8px rgba(0,212,255,0.4), 0 0 20px rgba(0,212,255,0.15);
  --glow-green: 0 0 8px rgba(107,206,158,0.4);
  --glow-red: 0 0 8px rgba(224,108,117,0.4);
}

html, body {
  height: 100%;
  background: var(--bg0);
  font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  color: var(--text);
  overflow: hidden;
}

/* ── Particle Background ── */
#particles-js {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Scanlines ── */
#scanlines {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  animation: scanMove 8s linear infinite;
}
@keyframes scanMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 100vh; }
}

/* ── Vignette ── */
#vignette {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
}

/* ── CRT glitch overlay ── */
#crt {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0;
}
#crt.glitch {
  animation: crtGlitch 0.3s steps(1) forwards;
}
@keyframes crtGlitch {
  0%   { opacity: 0; }
  10%  { opacity: 0.05; background: rgba(255,0,0,0.05); transform: translate(2px,0) skewX(2deg); }
  20%  { opacity: 0; transform: none; }
  30%  { opacity: 0.04; background: rgba(0,255,255,0.05); transform: translate(-1px,0); }
  100% { opacity: 0; transform: none; }
}

/* ── Main layout ── */
#wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 900px;
  height: 100vh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  backdrop-filter: blur(0px);
}

/* ── Title bar ── */
.titlebar {
  background: linear-gradient(90deg, #090b12, #0d1018, #090b12);
  padding: 11px 18px;
  display: flex;
  align-items: center;
  gap: 9px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  user-select: none;
  position: relative;
}
.titlebar::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}
.dot { width: 13px; height: 13px; border-radius: 50%; cursor: pointer; transition: filter 0.2s; }
.dot:hover { filter: brightness(1.3); }
.dot.r { background: #ff5f57; box-shadow: 0 0 6px rgba(255,95,87,0.5); }
.dot.y { background: #febc2e; box-shadow: 0 0 6px rgba(254,188,46,0.5); }
.dot.g { background: #28c840; box-shadow: 0 0 6px rgba(40,200,64,0.5); }
.tb-title {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'Orbitron', monospace;
}
.tb-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--dim);
}
.tb-status .pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent3);
  box-shadow: 0 0 6px var(--accent3);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* ── Tab bar ── */
.tabbar {
  display: flex;
  align-items: center;
  background: #080a10;
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  gap: 4px;
  flex-shrink: 0;
}
.tab {
  padding: 5px 14px;
  font-size: 11px;
  color: var(--dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.5px;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab:hover:not(.active) { color: var(--text); }
.tab-spacer { flex: 1; }
.tab-time { font-size: 10px; color: var(--dim); font-variant-numeric: tabular-nums; }

/* ── Output ── */
#out {
  flex: 1;
  overflow-y: auto;
  padding: 16px 22px 8px;
  font-size: 13px;
  line-height: 1.8;
  scroll-behavior: smooth;
  position: relative;
}
#out::-webkit-scrollbar { width: 4px; }
#out::-webkit-scrollbar-track { background: transparent; }
#out::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
#out::-webkit-scrollbar-thumb:hover { background: var(--border2); }

.line { white-space: pre-wrap; word-break: break-word; min-height: 1em; }
.line.new { animation: fadeSlide 0.2s ease forwards; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* colour helpers */
.p   { color: var(--cyan); }
.pu  { color: var(--blue); }
.pa  { color: var(--purple); }
.pd  { color: var(--dcdcaa); }
.cc  { color: var(--cyan); }
.cg  { color: var(--green); }
.cy  { color: var(--yellow); }
.cr  { color: var(--red); }
.ca  { color: var(--accent); }
.cb  { color: var(--blue); }
.cw  { color: var(--white); font-weight: 500; }
.cd  { color: var(--dim); }
.co  { color: var(--orange); }
.cm  { color: var(--magenta); }
.cg2 { color: var(--accent3); }

/* Glowing text */
.glow-text { text-shadow: var(--glow); }
.glow-green { text-shadow: var(--glow-green); }

/* Progress bar animation */
.progress-fill {
  display: inline-block;
  overflow: hidden;
  white-space: nowrap;
}

/* ── Hint / Quick commands bar ── */
#hints {
  padding: 6px 18px;
  display: flex;
  gap: 5px;
  flex-wrap: nowrap;
  overflow-x: auto;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #080a10, #060810);
  flex-shrink: 0;
  scrollbar-width: none;
}
#hints::-webkit-scrollbar { display: none; }
.hbtn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 3px 10px;
  background: rgba(26, 32, 48, 0.8);
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--blue);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.hbtn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.08), transparent);
  transform: translateX(-100%);
  transition: transform 0.3s;
}
.hbtn:hover::before { transform: translateX(100%); }
.hbtn:hover {
  background: rgba(0,212,255,0.1);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 10px rgba(0,212,255,0.15);
}
.hbtn:active { transform: scale(0.96); }

/* ── Status bar ── */
#statusbar {
  padding: 4px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 10px;
  color: var(--dim);
  background: #060810;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-item { display: flex; align-items: center; gap: 4px; }
.sb-item .dot-sm { width: 5px; height: 5px; border-radius: 50%; }
.sb-branch { color: var(--purple); }
.sb-spacer { flex: 1; }
.sb-right { display: flex; align-items: center; gap: 16px; }

/* ── Input row ── */
.input-row {
  display: flex;
  align-items: center;
  padding: 10px 22px 14px;
  gap: 8px;
  flex-shrink: 0;
  position: relative;
}
.input-row::before {
  content: '';
  position: absolute;
  top: 0; left: 22px; right: 22px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}
.ps { font-size: 13px; white-space: nowrap; flex-shrink: 0; }
.input-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}
#cmd {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text);
  caret-color: var(--accent);
  width: 100%;
}
#cmd::placeholder { color: var(--dim2); }

/* Autocomplete hint */
#autocomplete-hint {
  position: absolute;
  left: 0;
  top: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--dim);
  pointer-events: none;
  white-space: pre;
}

/* ── Matrix canvas ── */
#matrix-canvas {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  cursor: pointer;
}
#matrix-canvas.active { display: block; }
#matrix-exit {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 101;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 6px 20px;
  background: rgba(0,0,0,0.8);
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 1px;
  box-shadow: var(--glow);
  animation: matrixBtn 2s ease infinite;
}
@keyframes matrixBtn {
  0%,100% { box-shadow: 0 0 10px rgba(0,212,255,0.3); }
  50% { box-shadow: 0 0 20px rgba(0,212,255,0.6); }
}
#matrix-exit.active { display: block; }

/* ── Boot sequence ── */
#boot-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--bg0);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: opacity 0.5s;
}
#boot-overlay.hidden { opacity: 0; pointer-events: none; }
.boot-logo {
  font-family: 'Orbitron', monospace;
  font-size: clamp(20px, 4vw, 36px);
  font-weight: 900;
  color: var(--accent);
  text-shadow: var(--glow);
  letter-spacing: 4px;
  text-align: center;
}
.boot-sub {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.boot-bar-wrap {
  width: 280px;
  height: 2px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.boot-bar-fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
  border-radius: 2px;
  box-shadow: 0 0 10px var(--accent);
  transition: width 0.05s;
}
.boot-status {
  font-size: 11px;
  color: var(--dim);
  height: 16px;
}

/* ── Glitch text effect ── */
.glitch-text {
  position: relative;
  display: inline-block;
}
.glitch-text::before, .glitch-text::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  overflow: hidden;
}
.glitch-text::before {
  color: var(--magenta);
  animation: glitch1 3s infinite;
}
.glitch-text::after {
  color: var(--accent);
  animation: glitch2 3s infinite;
}
@keyframes glitch1 {
  0%,90%,100% { clip-path: none; transform: none; opacity: 0; }
  91% { clip-path: inset(30% 0 50% 0); transform: translate(-2px, 0); opacity: 0.8; }
  93% { clip-path: inset(60% 0 10% 0); transform: translate(2px, 0); opacity: 0.8; }
  95% { clip-path: none; transform: none; opacity: 0; }
}
@keyframes glitch2 {
  0%,85%,100% { clip-path: none; transform: none; opacity: 0; }
  86% { clip-path: inset(10% 0 70% 0); transform: translate(2px, 0); opacity: 0.6; }
  88% { clip-path: inset(50% 0 20% 0); transform: translate(-1px, 0); opacity: 0.6; }
  90% { clip-path: none; transform: none; opacity: 0; }
}

/* ── Spinner ── */
.spinner {
  display: inline-block;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  from { content: '⣾'; }
  12.5% { content: '⣽'; }
  25% { content: '⣻'; }
  37.5% { content: '⢿'; }
  50% { content: '⡿'; }
  62.5% { content: '⣟'; }
  75% { content: '⣯'; }
  87.5% { content: '⣷'; }
  to { content: '⣾'; }
}

/* ── Effect overlays ── */
#effect-canvas {
  position: fixed;
  inset: 0;
  z-index: 50;
  pointer-events: none;
  display: none;
}
#effect-canvas.active { display: block; }

/* ── Screensaver ── */
#screensaver {
  position: fixed;
  inset: 0;
  z-index: 90;
  background: var(--bg0);
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: 'Orbitron', monospace;
}
#screensaver.active { display: flex; }
.ss-clock {
  font-size: clamp(40px, 8vw, 80px);
  font-weight: 900;
  color: var(--accent);
  text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0,212,255,0.3);
  letter-spacing: 6px;
  animation: clockPulse 4s ease-in-out infinite;
}
@keyframes clockPulse {
  0%,100% { text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0,212,255,0.3); }
  50% { text-shadow: 0 0 50px var(--accent), 0 0 100px rgba(0,212,255,0.5); }
}
.ss-date {
  font-size: 14px;
  color: var(--dim);
  letter-spacing: 4px;
  margin-top: 12px;
  text-align: center;
}

/* ── ASCII art ── */
.ascii { font-size: 11px; line-height: 1.4; }

/* ── Rainbow text ── */
.rainbow { animation: rainbowShift 3s linear infinite; }
@keyframes rainbowShift {
  0%   { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* ── Typing cursor blink ── */
#cursor-blink {
  display: inline-block;
  width: 8px; height: 14px;
  background: var(--accent);
  vertical-align: middle;
  animation: blink 1.2s step-start infinite;
  box-shadow: var(--glow);
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── Context menu ── */
#ctx-menu {
  position: fixed;
  z-index: 300;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 6px 0;
  min-width: 160px;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#ctx-menu.active { display: block; }
.ctx-item {
  padding: 6px 16px;
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.1s;
}
.ctx-item:hover { background: rgba(0,212,255,0.08); color: var(--accent); }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Skill bar animation ── */
@keyframes growBar {
  from { width: 0; }
}

/* ── Notification toast ── */
#toast {
  position: fixed;
  top: 60px;
  right: 20px;
  z-index: 400;
  background: var(--bg2);
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 10px 16px;
  font-size: 12px;
  color: var(--accent);
  box-shadow: var(--glow);
  transform: translateX(120%);
  transition: transform 0.3s ease;
  max-width: 250px;
}
#toast.show { transform: translateX(0); }

/* ── Game elements ── */
.game-area {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 12px;
  margin: 4px 0;
  font-family: monospace;
}
</style>
</head>
<body>

<!-- Boot overlay -->
<div id="boot-overlay">
  <div class="boot-logo">NICK@UNIVERSE</div>
  <div class="boot-sub">Terminal v2.0 — Initializing System</div>
  <div class="boot-bar-wrap"><div class="boot-bar-fill" id="boot-fill"></div></div>
  <div class="boot-status" id="boot-status">Loading kernel...</div>
</div>

<!-- Particles -->
<div id="particles-js"></div>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="crt"></div>

<!-- Screensaver -->
<div id="screensaver">
  <div style="text-align:center">
    <div class="ss-clock" id="ss-clock">00:00:00</div>
    <div class="ss-date" id="ss-date"></div>
    <div style="margin-top:20px;font-size:11px;color:var(--dim);letter-spacing:2px;">CLICK TO WAKE</div>
  </div>
</div>

<!-- Context menu -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAction('copy')">📋 Copy output</div>
  <div class="ctx-item" onclick="ctxAction('clear')">🗑️ Clear terminal</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('theme')">🎨 Toggle theme</div>
  <div class="ctx-item" onclick="ctxAction('matrix')">💊 Enter matrix</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('zoom+')">🔍 Zoom in</div>
  <div class="ctx-item" onclick="ctxAction('zoom-')">🔍 Zoom out</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Matrix -->
<canvas id="matrix-canvas"></canvas>
<button id="matrix-exit">[ PRESS ANY KEY OR CLICK TO EXIT ]</button>

<!-- Effect canvas -->
<canvas id="effect-canvas"></canvas>

<div id="wrap">
  <div class="titlebar">
    <div class="dot r" title="Close" onclick="showToast('Nice try 😏')"></div>
    <div class="dot y" title="Minimize" onclick="toggleScreensaver()"></div>
    <div class="dot g" title="Maximize" onclick="showToast('Already fullscreen!')"></div>
    <div class="tb-title" id="tb-title">nick@universe — zsh — 80×24</div>
    <div class="tb-status">
      <div class="pulse"></div>
      <span id="tb-time">--:--</span>
    </div>
  </div>

  <div class="tabbar">
    <div class="tab active">zsh</div>
    <div class="tab" onclick="showToast('npm run dev — port 5173')">npm</div>
    <div class="tab" onclick="showToast('git log --oneline')">git</div>
    <div class="tab-spacer"></div>
    <div class="tab-time" id="tab-time"></div>
  </div>

  <div id="out"></div>

  <div id="hints"></div>

  <div id="statusbar">
    <div class="sb-item">
      <div class="dot-sm" style="background:var(--accent3);box-shadow:0 0 4px var(--accent3)"></div>
      <span class="sb-branch">⎇ main</span>
    </div>
    <div class="sb-item"><span class="cd">✓ 0 errors</span></div>
    <div class="sb-item"><span style="color:var(--yellow)">⚡ UTF-8</span></div>

function beep(freq = 440, duration = 50) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.03, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration/1000);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration/1000);
  } catch(e) {}
}

/* ═══════════════════════════════════════════════════
   SNAKE game
═══════════════════════════════════════════════════ */
let snakeGame = null;
function startSnake() {
  const W=20, H=10;
  let snake=[{x:10,y:5}], dir={x:1,y:0}, food=randFood(), score=0, alive=true;
  function randFood() {
    let f;
    do { f={x:Math.floor(Math.random()*W), y:Math.floor(Math.random()*H)}; }
    while(snake.some(s=>s.x===f.x&&s.y===f.y));
    return f;
  }
  function render() {
    let grid = Array.from({length:H},()=>Array(W).fill('·'));
    snake.forEach((s,i) => { if(s.x>=0&&s.x<W&&s.y>=0&&s.y<H) grid[s.y][s.x] = i===0?'█':'▪'; });
    if(food.x>=0&&food.x<W&&food.y>=0&&food.y<H) grid[food.y][food.x]='●';
    const gameEl = document.getElementById('snake-game');
    if (!gameEl) { clearInterval(snakeGame); return; }
    gameEl.innerHTML = `<span class="ca">SCORE: ${score}</span>  <span class="cd">[WASD to move | Q to quit]</span>\n\n` +
      `  ╔${'═'.repeat(W)}╗\n` +
      grid.map(row => `  ║<span class="cg">${row.join('')}</span>║`).join('\n') +
      `\n  ╚${'═'.repeat(W)}╝`;
  }
  function step() {
    if (!alive) return;
    const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    if(head.x<0||head.x>=W||head.y<0||head.y>=H||snake.some(s=>s.x===head.x&&s.y===head.y)) {
      alive=false;
      clearInterval(snakeGame); snakeGame=null;
      const el = document.getElementById('snake-game');
      if(el) el.innerHTML = `<span class="cr">GAME OVER — Final score: ${score}</span>\n<span class="cd">Type 'snake' to play again</span>`;
      return;
    }
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y) { score+=10; food=randFood(); beep(880,50); }
    else snake.pop();
    render();
  }
  appendLine(`<div id="snake-game" class="game-area ascii"></div>`);
  render(); scroll();
  snakeGame = setInterval(step, 150);

  const snakeKey = e => {
    const map = {w:{x:0,y:-1},a:{x:-1,y:0},s:{x:0,y:1},d:{x:1,y:0}};
    const k = e.key.toLowerCase();
    if(map[k] && !(map[k].x===-dir.x||map[k].y===-dir.y)) dir=map[k];
    if(k==='q') { clearInterval(snakeGame); snakeGame=null; alive=false; document.removeEventListener('keydown',snakeKey); appendLine(`<span class="cd">Snake quit.</span>`); scroll(); }
  };
  document.addEventListener('keydown', snakeKey);
}

    ``,
    `   +${line}+`,
    `   | ${msg} |`,
    `   +${line}+`,
    `        \\   ^__^`,
    `         \\  (oo)\\_______`,
    `            (__)\\       )\\/\\`,
    `                ||----w |`,
    `                ||     ||`,
    ``,
  ];
}

function bigBanner(text) {
  // Simple chunky ASCII: each letter mapped
  const letters = {
    N:[' ███╗   ██╗',' ████╗  ██║',' ██╔██╗ ██║',' ██║╚██╗██║',' ██║ ╚████║',' ╚═╝  ╚═══╝'],
    I:[' ██╗',' ██║',' ██║',' ██║',' ██║',' ╚═╝'],
    C:[' ██████╗',' ██╔════╝',' ██║     ',' ██║     ',' ╚██████╗',' ╚═════╝'],
    K:[' ██╗  ██╗',' ██║ ██╔╝',' █████╔╝ ',' ██╔═██╗ ',' ██║  ██╗',' ╚═╝  ╚═╝'],
  };
  if (!letters[text[0]]) return [`<span class="ca">  ██ ${text} ██</span>`];
  const rows = 6;
  const lines = [];
  for (let r=0;r<rows;r++) {
    let row='  ';
    for (const ch of text.toUpperCase()) {
      if(letters[ch]) row+=letters[ch][r]+'  ';
    }
    lines.push(`<span class="ca">${row}</span>`);
  }
  return ['', ...lines, ''];
}

async function ping(host) {
  appendLine(`  <span class="cd">PING ${host} — 64 bytes of data:</span>`);
  for (let i=0;i<4;i++) {
    await new Promise(r=>setTimeout(r,300+Math.random()*200));
    const ms = (Math.random()*30+5).toFixed(2);
    const ttl = Math.floor(50+Math.random()*64);
    appendLine(`  <span class="cg">64 bytes from ${host}: icmp_seq=${i+1} ttl=${ttl} time=${ms} ms</span>`);
    beep(600,20); scroll();
  }
  appendLine(`  <span class="cd">--- ${host} ping statistics ---</span>`);
  appendLine(`  <span class="cw">4 packets transmitted, 4 received, 0% packet loss</span>`);
  appendLine(''); scroll();
}

async function curlSim(url) {
  appendLine(`  <span class="cd">  % Total    % Received % Xferd</span>`);
  await new Promise(r=>setTimeout(r,200));
  appendLine(`  <span class="cg">100  1024  100  1024    0     0   4096      0 --:--:-- --:--:--</span>`);
  await new Promise(r=>setTimeout(r,300));
  const fakeJson = { status:'ok', url, server:'NickOS', latency:'12ms', data:{ message:'Hello from the terminal!' } };
  appendLine(`  <span class="cy">${JSON.stringify(fakeJson, null, 2).replace(/\n/g,'\n  ')}</span>`);
  appendLine(''); scroll();
}

  { name:'Matrix Green', accent:'#00ff88', cyan:'#00ff88', green:'#00cc66' },
  { name:'Neon Pink',    accent:'#ff00aa', cyan:'#ff66cc', green:'#ff44cc' },
  { name:'Solar Orange', accent:'#ff8c00', cyan:'#ffaa44', green:'#ffcc00' },
  { name:'Violet Dream', accent:'#c586c0', cyan:'#9b59b6', green:'#8e44ad' },
];
let themeIdx = 0;
function cycleTheme() {
  themeIdx = (themeIdx+1) % THEMES.length;
  const t = THEMES[themeIdx];
  document.documentElement.style.setProperty('--accent', t.accent);
  document.documentElement.style.setProperty('--cyan', t.cyan);
  document.documentElement.style.setProperty('--green', t.green);
  showToast(`Theme: ${t.name}`);
  return [``, `  <span class="ca">Theme switched to:</span> <span class="cw">${t.name}</span>`, ``];
}

async function run(raw) {
  const cmd = raw.trim();
  if (!cmd) return;
  hist.unshift(cmd); hi = -1; cmdCount++;
  acHint.textContent = '';
  document.getElementById('sb-cmds').textContent = `cmds: ${cmdCount}`;
  beep(330, 20);
  glitch();

  appendLine(`${PROMPT} <span style="color:var(--text)">${esc(cmd)}</span>`);

  const parts = cmd.split(/\s+/);
  const verb  = parts[0].toLowerCase();
  const arg   = parts.slice(1).join(' ');

  if (verb === 'cat') {
    const f = arg.trim();
    const lines = CAT_FILES[f];
    if (lines) lines.forEach(l => appendLine(l));
    else appendLine(`  <span class="cr">cat: ${esc(f||'')}: No such file or directory</span>`);
    appendLine(''); scroll();
  } else if (verb === 'echo') {
    appendLine(`  ${esc(arg)}`);
    appendLine(''); scroll();
  } else if (verb === 'lolcat') {
    const text = arg || 'try: lolcat hello world';
    appendLine(`  ${lolcat(text)}`);
    appendLine(''); scroll();
  } else if (verb === 'banner') {
    const text = (arg || 'NICK').toUpperCase().slice(0,4);
    bigBanner(text).forEach(l => appendLine(l));
    scroll();
  } else if (verb === 'cowsay') {
    cowsay(arg || 'Hello, World!').forEach(l => appendLine(l));
    scroll();
  } else if (verb === 'matrix') {
    appendLine(`  <span class="cg">Entering the Matrix... click or press any key to exit.</span>`);
    appendLine(''); scroll();
    setTimeout(startMatrix, 600);
    return;
  } else if (verb === 'rain') {
    appendLine(`  <span class="ca">Cyber rain activated for 8 seconds...</span>`);
    appendLine(''); scroll();
    startRain();
  } else if (verb === 'fireworks') {
    appendLine(`  <span class="cm">🎆 Launching fireworks!</span>`);
    appendLine(''); scroll();
    setTimeout(fireFireworks, 200);
  } else if (verb === 'glitch') {
    appendLine(`  <span class="cr">Triggering glitch storm...</span>`);
    appendLine(''); scroll();
    for(let i=0;i<8;i++) setTimeout(glitch, i*200);
  } else if (verb === 'hack') {
    await hackSim();
  } else if (verb === 'snake') {
    appendLine(`  <span class="cg">Starting Snake — WASD to move, Q to quit</span>`);
    appendLine(''); scroll();
    startSnake();
    return;
  } else if (verb === 'ping') {
    const host = arg || 'github.com';
    await ping(host);
    return;
  } else if (verb === 'curl') {
    await curlSim(arg || 'https://api.nick.dev/info');
    return;
  } else if (verb === 'sudo') {
    await sudo(arg);
    return;
  } else if (verb === 'music') {
    startMusic();
    if (!musicInterval) { appendLine(''); scroll(); }
    return;
  } else if (verb === 'history') {
    CMDS.history(hist).forEach(l => appendLine(l));
    appendLine(''); scroll();
  } else if (CMDS[verb]) {
    const lines = CMDS[verb]();
    if (lines) { lines.forEach(l => appendLine(l)); scroll(); }
  } else {
    appendLine(`  <span class="cr">zsh: command not found: ${esc(verb)}</span>`);
    appendLine(`  <span class="cd">  Type <span class="cc">help</span> to see all commands.</span>`);
    appendLine(''); scroll();
  }

  if (!['ping','curl','sudo','hack','music','snake'].includes(verb)) {
    appendLine(''); scroll();
  }
  inp.value = '';
}

/* ═══════════════════════════════════════════════════
   Input handling
═══════════════════════════════════════════════════ */
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    run(inp.value);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (hi < hist.length-1) { hi++; inp.value = hist[hi]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (hi > 0) { hi--; inp.value = hist[hi]; } else { hi=-1; inp.value=''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const v = inp.value.trim();
    const m = ALL_CMDS.find(c => c.startsWith(v) && c !== v);
    if (m) { inp.value = m; acHint.textContent = ''; }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault(); out.innerHTML = '';
  }
});

inp.addEventListener('click', () => {
  document.getElementById('screensaver').classList.remove('active');
  inp.focus();
});

/* Focus the input on any keypress */
document.addEventListener('keypress', e => {
  if (!['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName) &&
      !canvas.classList.contains('active')) {
    inp.focus();
  }
});
